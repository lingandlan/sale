stages:
  deploy:
    name: "部署"
    jobs:
      vm_deploy_job:
        name: "主机部署"
        component: "VMDeploy"
        with:
          downloadArtifact: false
          useEncode: true
          machineGroup: "cGv8dfldJgwggYcA"
          run: |
            cd /opt/sale
            git pull

            # 使用 docker-compose.prod.yml 构建并启动
            # 该配置包含 SSL 证书卷挂载和 APP_DATABASE_HOST 等环境变量
            docker compose -f docker-compose.prod.yml build --no-cache backend frontend

            # 停止旧容器（强制重建）
            docker compose -f docker-compose.prod.yml down --remove-orphans

            # 启动所有容器
            docker compose -f docker-compose.prod.yml --env-file .env up -d

            # 验证后端 migration 成功
            sleep 5
            docker logs sale-backend --tail 10
          executeUser: "root"
