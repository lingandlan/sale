stages:
  build:
    name: "构建镜像"
    jobs:
      build_frontend:
        name: "构建前端镜像"
        runs-on: ubuntu-latest
        steps:
          - checkout: {}
          - name: 构建前端
            run: |
              cd shop-pc
              npm install
              npm run build
          - name: 构建 Docker 镜像
            run: |
              docker build -t sale-frontend:latest -f Dockerfile.prod-frontend shop-pc/
          - name: 保存镜像
            run: |
              docker save sale-frontend:latest | gzip > frontend-image.tar.gz
          - name: 上传制品
            uses: actions/upload-artifact@v4
            with:
              name: frontend-image
              path: frontend-image.tar.gz
              retention-days: 1

      build_backend:
        name: "构建后端镜像"
        runs-on: ubuntu-latest
        steps:
          - checkout: {}
          - name: 编译后端
            run: |
              cd backend
              go mod download
              go build -o ../server ./cmd/server
              go build -o ../migrate ./migrations
          - name: 构建 Docker 镜像
            run: |
              docker build -t sale-backend:latest -f Dockerfile.prod-backend .
          - name: 保存镜像
            run: |
              docker save sale-backend:latest | gzip > backend-image.tar.gz
          - name: 上传制品
            uses: actions/upload-artifact@v4
            with:
              name: backend-image
              path: backend-image.tar.gz
              retention-days: 1

  deploy:
    name: "部署"
    needs: [build]
    jobs:
      vm_deploy_job:
        name: "主机部署"
        component: "VMDeploy"
        with:
          downloadArtifact: true
          useEncode: true
          machineGroup: "cGv8dfldJgwggYcA"
          run: |
            cd /opt/sale

            # 下载制品
            if [ -f frontend-image.tar.gz ]; then
              docker load < frontend-image.tar.gz
            fi
            if [ -f backend-image.tar.gz ]; then
              docker load < backend-image.tar.gz
            fi

            # 重启容器
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml --env-file .env up -d

            # 验证
            sleep 5
            docker logs sale-backend --tail 10
          executeUser: "root"
