version: '3.8'

# =============================================================================
# 太积堂充值与门店管理系统 - 本地开发环境
# =============================================================================

services:
  mysql:
    container_name: sale-mysql
    image: registry.cn-shenzhen.aliyuncs.com/wsy_dev/mysql:5.6.01
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sale_dev}
      MYSQL_USER: ${MYSQL_USER:-sale}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sale123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --default-storage-engine=innodb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    container_name: sale-redis
    image: redis:latest
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 可选：MailHog 用于开发环境测试邮件
  mailhog:
    container_name: sale-mailhog
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

networks:
  default:
    name: sale-network

volumes:
  mysql_data:
    name: sale-mysql-data
  redis_data:
    name: sale-redis-data
