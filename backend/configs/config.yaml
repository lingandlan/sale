# Marketplace API Configuration

server:
  port: 8080
  mode: debug  # debug / release

database:
  host: localhost
  port: 3306
  user: sale
  password: sale123
  name: sale_dev
  max_open_conns: 100
  max_idle_conns: 10
  tls: false  # 本地开发不需要 TLS，生产环境开启
  # ca_cert: /etc/mysql/certs/ca.crt

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: your-super-secret-key-change-in-production
  expire_hours: 24        # Access Token 过期时间
  refresh_expire_hours: 168  # Refresh Token 过期时间 (7天)

log:
  mode: debug  # debug / production
  level: info  # debug / info / warn / error
  service_name: marketplace-api
