# =============================================================================
# Casbin RBAC Model Configuration
# =============================================================================
#
# request_definition: 定义权限检查的参数
# policy_definition: 定义策略的结构
# role_definition: 定义角色继承关系
# policy_effect: 定义策略效果（allow/deny）
# matchers: 定义匹配规则
#

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && keyMatch2(r.obj, p.obj) && regexMatch(r.act, p.act)

# =============================================================================
# 策略格式说明
# =============================================================================
#
# 策略定义 (p):
# p = <role>, <path>, <method>
#
# 示例:
# p, admin, /api/v1/admin/*, *
# p, merchant, /api/v1/merchant/*, *
# p, user, /api/v1/user/*, GET
# p, user, /api/v1/user/*, POST
# p, user, /api/v1/user/*, PUT
# p, user, /api/v1/user/:id, DELETE
#
# 角色关联 (g):
# g = <user_id>, <role>
#
# 示例:
# g, user_123, admin
# g, user_456, merchant
# g, user_789, user
#
# =============================================================================
# 路径匹配说明
# =============================================================================
#
# keyMatch2 支持的通配符:
# * 匹配任意字符（不含斜杠）
# ** 匹配任意字符（含斜杠）
#
# 示例:
# /api/v1/admin/* 匹配 /api/v1/admin/users, /api/v1/admin/products
# /api/v1/user/:id 匹配 /api/v1/user/123
#
# regexMatch 支持正则表达式:
# /api/v1/user/* 匹配 /api/v1/user/123, /api/v1/user/abc
#
# =============================================================================
