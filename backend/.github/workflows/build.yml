# =============================================================================
# GitHub Actions - Build and Push Docker Image
# =============================================================================

name: Build and Push

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAME: ${{ github.event.repository.name }}
  GITHUB_SHA: ${{ github.sha }}

jobs:
  # ===========================================================================
  # Job 1: Lint and Test
  # ===========================================================================
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.59.0
          golangci-lint run ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -html=coverage.txt -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

      - name: Check coverage threshold
        run: |
          go install github.com/mfridman/tparse@latest
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk -F'[ %]+' '{print $3}')
          echo "Current coverage: ${COVERAGE}%"
          echo "--- Coverage by package ---"
          go tool cover -func=coverage.txt | grep -E "^(marketplace|ok)" | head -20
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "ERROR: Coverage is below minimum threshold (50%)"
            exit 1
          fi
          echo "✅ Coverage check passed!"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

      - name: Notify on failure
        if: failure()
        run: |
          echo "Tests failed on commit ${{ github.sha }}"
          echo "Check: ${{ github.server_url }}/${{ github.repository }}/actions"

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.txt | grep "^marketplace" | awk '{print "| " $1 " | " $3 " |"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report: coverage.html artifact" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job: Integration Tests
  # ===========================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Start MySQL for integration tests
        uses: isbang/compose-action@v1
        with:
          compose-file: './tests/integration/docker-compose.yml'

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if docker exec sale-mysql-test mysqladmin ping -h localhost -uroot -proot123 &>/dev/null; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL failed to start"
          exit 1

      - name: Create test database
        run: |
          docker exec sale-mysql-test mysql -uroot -proot123 -e "CREATE DATABASE IF NOT EXISTS test_db;"

      - name: Run migrations
        run: |
          cd backend
          go install github.com/pressly/goose/v3/cmd/goose@latest
          goose -dir migrations mysql "root:root123@tcp(sale-mysql-test:3306)/test_db?parseTime=true" up

      - name: Run integration tests
        env:
          TEST_DSN: root:root123@tcp(sale-mysql-test:3306)/test_db?parseTime=true&charset=utf8mb4
        run: |
          cd backend
          go test -v -tags=integration ./tests/integration/...

      - name: Cleanup
        if: always()
        run: docker-compose -f tests/integration/docker-compose.yml down

  # ===========================================================================
  # Job 2: Build and Push Docker Image
  # ===========================================================================
  build-and-push:
    name: Build and Push Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Job 3: Update GitOps Repo (for ArgoCD)
  # ===========================================================================
  update-gitops:
    name: Update GitOps Repository
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}-gitops
          path: gitops
          token: ${{ secrets.GITOPS_REPO_TOKEN }}

      - name: Update image tag
        run: |
          cd gitops
          # Update dev environment
          sed -i 's|image: .*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GITHUB_SHA }}|' clusters/dev/backend.yaml

          # Commit and push
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: update backend image to ${{ env.GITHUB_SHA }}"
          git push
