# 生产环境 Docker Compose - 本地构建镜像（服务器需安装 Go + Node.js）
# 如果服务器无构建工具，改用 CI 构建 + docker save/load 方案

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.prod-backend
    image: sale-backend:latest
    container_name: sale-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - APP_SERVER_PORT=8080
      - APP_REDIS_DB=0
      - APP_DATABASE_HOST=db
      - APP_DATABASE_PORT=3306
      - APP_DATABASE_USER=sale
      - APP_DATABASE_NAME=sale_dev
      - APP_DATABASE_PASSWORD=${DB_PASSWORD}
      - APP_REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET}
      - MALL_APP_ID=${MALL_APP_ID:-}
      - MALL_APP_SECRET=${MALL_APP_SECRET:-}
      - MALL_CUSTOMER_ID=${MALL_CUSTOMER_ID:-}
      - MALL_BASE_URL=${MALL_BASE_URL:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://center.xingyunxuan.cn}
    depends_on:
      - db
      - redis
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/var/log/marketplace

  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile.prod-frontend
    image: sale-frontend:latest
    container_name: sale-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    volumes:
      - /opt/sale/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

  db:
    image: mysql:8.0
    container_name: sale-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sale_dev}
      MYSQL_USER: ${MYSQL_USER:-sale}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: sale-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql-data:
  backend-uploads:
  backend-logs:
